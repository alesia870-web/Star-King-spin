<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0d40">
  <meta name="description" content="Spin Kingdom - joc simplu instalabil pe telefon">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <title>Spin Kingdom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #1a0d40, #311b92);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #ffd54f;
    }
    p {
      color: #d1c4e9;
      margin-bottom: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
    }
    .label {
      font-size: 0.85rem;
      color: #d1c4e9;
      margin-bottom: 6px;
    }
    .value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff176;
    }
    .slot {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 22px 0;
    }
    .reel {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: bold;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.12);
    }
    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(180deg, #e53935, #b71c1c);
      color: white;
      cursor: pointer;
    }
    button:disabled {
      background: #777;
      cursor: not-allowed;
    }
    .message {
      margin-top: 16px;
      min-height: 24px;
      color: #fff59d;
      font-weight: bold;
    }
    .small {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #b39ddb;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🎰 Spin Kingdom</h1>
    <p>Apasă SPIN și câștigă monede.</p>

    <div class="stats">
      <div class="card">
        <div class="label">Monede</div>
        <div class="value" id="coins">1000</div>
      </div>
      <div class="card">
        <div class="label">Rotiri</div>
        <div class="value" id="spins">20</div>
      </div>
    </div>

    <div class="slot">
      <div class="reel" id="r1">🪙</div>
      <div class="reel" id="r2">💎</div>
      <div class="reel" id="r3">⭐</div>
    </div>

    <button id="spinBtn">SPIN</button>
    <div class="message" id="message"></div>
    <div class="small">Link joc: https://alesia870-web.github.io/Star-King-spin/</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js');
      });
    }

    var coins = parseInt(localStorage.getItem('spin_coins') || '1000', 10);
    var spins = parseInt(localStorage.getItem('spin_spins') || '20', 10);
    var symbols = ['🪙', '💎', '⭐', '🍀', '👑', '🔥'];

    var coinsEl = document.getElementById('coins');
    var spinsEl = document.getElementById('spins');
    var msgEl = document.getElementById('message');
    var btn = document.getElementById('spinBtn');
    var reels = [
      document.getElementById('r1'),
      document.getElementById('r2'),
      document.getElementById('r3')
    ];

    function saveGame() {
      localStorage.setItem('spin_coins', String(coins));
      localStorage.setItem('spin_spins', String(spins));
    }

    function render() {
      coinsEl.textContent = coins;
      spinsEl.textContent = spins;
      btn.disabled = spins <= 0;
      if (spins <= 0) {
        msgEl.textContent = 'Nu mai ai rotiri.';
      }
    }

    function randomSymbol() {
      return symbols[Math.floor(Math.random() * symbols.length)];
    }

    function rewardFor(symbol) {
      if (symbol === '🪙') return 50;
      if (symbol === '💎') return 120;
      if (symbol === '⭐') return 80;
      if (symbol === '🍀') return 60;
      if (symbol === '👑') return 200;
      if (symbol === '🔥') return 150;
      return 40;
    }

    btn.addEventListener('click', function () {
      if (spins <= 0) return;

      spins -= 1;
      msgEl.textContent = 'Se învârte...';
      btn.disabled = true;

      setTimeout(function () {
        var a = randomSymbol();
        var b = randomSymbol();
        var c = randomSymbol();

        reels[0].textContent = a;
        reels[1].textContent = b;
        reels[2].textContent = c;

        if (a === b && b === c) {
          var reward = rewardFor(a) * 3;
          coins += reward;
          msgEl.textContent = 'Jackpot! +' + reward + ' monede';
        } else if (a === b || b === c || a === c) {
          var pairReward = 40;
          coins += pairReward;
          msgEl.textContent = 'Ai nimerit o pereche! +' + pairReward + ' monede';
        } else {
          msgEl.textContent = 'Mai încearcă!';
        }

        saveGame();
        render();
      }, 500);
    });

    render();
  </script>
</body>
</html>
